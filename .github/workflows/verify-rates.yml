name: Monthly Rate Verification

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:
    inputs:
      asof:
        description: 'Override "today" (YYYY-MM-DD) for a test run. Blank = real current date.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run: log what would happen, do NOT open issues.'
        type: boolean
        required: false
        default: false

jobs:
  check-rates:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Run rate verification
        run: node scripts/verify-rates.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Manual-dispatch overrides only; both are empty on the scheduled run
          # (so the monthly job always uses the real date and runs live).
          ASOF: ${{ inputs.asof }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
